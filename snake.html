<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #21262d;
    --teal:    #2dd4bf;
    --teal-dim:#1a7f72;
    --mustard: #d4a017;
    --white:   #e6edf3;
    --muted:   #8b949e;
    --obstacle:#30363d;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Mono', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }

  h1 {
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    color: var(--teal);
    text-transform: uppercase;
  }

  #hud {
    display: flex;
    gap: 32px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  #hud span { color: var(--white); }

  canvas {
    background: var(--surface);
    border: 1px solid var(--border);
    display: block;
  }

  #msg {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }

  #msg h2 { font-size: 1.4rem; color: var(--mustard); letter-spacing: 0.1em; }
  #msg p  { font-size: 0.8rem; color: var(--muted); }

  #wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<h1>&#9651; Snake</h1>

<div id="hud">
  SCORE: <span id="score">0</span> &nbsp;&nbsp; BEST: <span id="best">0</span>
</div>

<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="msg">
    <h2 id="msg-title">SNAKE</h2>
    <p id="msg-sub">Press SPACE or tap to start</p>
  </div>
</div>

<script>
const CELL = 20;
const COLS = 25;
const ROWS = 25;
const W = COLS * CELL;
const H = ROWS * CELL;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const msg     = document.getElementById('msg');
const msgTitle = document.getElementById('msg-title');
const msgSub  = document.getElementById('msg-sub');

const C = {
  bg:       '#161b22',
  grid:     '#1c2128',
  snake:    '#2dd4bf',
  snakeHead:'#5eead4',
  apple:    '#d4a017',
  appleGlow:'#f5c842',
  obstacle: '#30363d',
  obBorder: '#444c56',
};

// ---- state ----
let snake, dir, nextDir, apple, obstacles, score, best, state, ticker;
best = +localStorage.getItem('snakeBest') || 0;
bestEl.textContent = best;

const OBSTACLE_SETS = [
  // cross pattern
  [{x:8,y:8},{x:9,y:8},{x:10,y:8},{x:8,y:9},{x:8,y:10},
   {x:16,y:16},{x:17,y:16},{x:16,y:17},{x:16,y:15},
   {x:4,y:18},{x:5,y:18},{x:4,y:19},{x:20,y:4},{x:20,y:5},{x:21,y:4}],
  // walls
  [{x:5,y:5},{x:5,y:6},{x:5,y:7},{x:5,y:8},
   {x:19,y:5},{x:19,y:6},{x:19,y:7},{x:19,y:8},
   {x:5,y:16},{x:5,y:17},{x:5,y:18},{x:5,y:19},
   {x:19,y:16},{x:19,y:17},{x:19,y:18},{x:19,y:19},
   {x:11,y:11},{x:12,y:11},{x:13,y:11},{x:11,y:12},{x:13,y:12},{x:11,y:13},{x:12,y:13},{x:13,y:13}],
  // scattered
  [{x:3,y:3},{x:7,y:3},{x:12,y:2},{x:18,y:4},{x:21,y:2},
   {x:2,y:12},{x:6,y:10},{x:10,y:8},{x:14,y:11},{x:20,y:9},{x:23,y:12},
   {x:3,y:20},{x:8,y:19},{x:13,y:21},{x:17,y:18},{x:22,y:22}],
];

function key(x, y) { return `${x},${y}`; }

function freeCell(blocked) {
  let x, y;
  do { x = Math.floor(Math.random() * COLS); y = Math.floor(Math.random() * ROWS); }
  while (blocked.has(key(x, y)));
  return {x, y};
}

function init() {
  const mid = Math.floor(COLS / 2);
  snake = [{x: mid, y: mid}, {x: mid-1, y: mid}, {x: mid-2, y: mid}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  scoreEl.textContent = 0;

  obstacles = OBSTACLE_SETS[Math.floor(Math.random() * OBSTACLE_SETS.length)];

  const blocked = new Set([
    ...snake.map(s => key(s.x, s.y)),
    ...obstacles.map(o => key(o.x, o.y)),
  ]);
  apple = freeCell(blocked);

  state = 'running';
  msg.style.display = 'none';

  clearInterval(ticker);
  ticker = setInterval(tick, 120);
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();

  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

  // obstacle collision
  if (obstacles.some(o => o.x === head.x && o.y === head.y)) return die();

  const ate = head.x === apple.x && head.y === apple.y;
  snake.unshift(head);
  if (!ate) snake.pop();
  else {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snakeBest', best); }

    const blocked = new Set([
      ...snake.map(s => key(s.x, s.y)),
      ...obstacles.map(o => key(o.x, o.y)),
    ]);
    apple = freeCell(blocked);
  }

  draw();
}

function die() {
  clearInterval(ticker);
  state = 'dead';
  msgTitle.textContent = 'GAME OVER';
  msgSub.textContent = `Score: ${score} — Press SPACE or tap to restart`;
  msg.style.display = 'flex';
  draw();
}

// ---- drawing ----
function drawGrid() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
  }
}

function drawObstacles() {
  obstacles.forEach(o => {
    ctx.fillStyle = C.obstacle;
    ctx.fillRect(o.x * CELL + 1, o.y * CELL + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = C.obBorder;
    ctx.lineWidth = 1;
    ctx.strokeRect(o.x * CELL + 1, o.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

function drawApple() {
  const cx = apple.x * CELL + CELL / 2;
  const cy = apple.y * CELL + CELL / 2;
  const r  = CELL / 2 - 3;

  // glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 4);
  grd.addColorStop(0, 'rgba(212,160,23,0.4)');
  grd.addColorStop(1, 'rgba(212,160,23,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = C.apple;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = C.appleGlow;
  ctx.beginPath(); ctx.arc(cx - 2, cy - 2, r * 0.3, 0, Math.PI * 2); ctx.fill();
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    // fade from head color to dim teal toward tail
    const alpha = 1 - t * 0.5;
    ctx.fillStyle = i === 0 ? C.snakeHead : `rgba(45,212,191,${alpha})`;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, i === 0 ? 4 : 3);
    ctx.fill();
  });
}

function draw() {
  drawGrid();
  drawObstacles();
  drawApple();
  drawSnake();
}

// ---- initial draw ----
function showStart() {
  state = 'idle';
  snake = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir = {x:1,y:0};
  obstacles = OBSTACLE_SETS[0];
  apple = {x:16,y:12};
  draw();
  msg.style.display = 'flex';
  msgTitle.textContent = 'SNAKE';
  msgSub.textContent = 'Press SPACE or tap to start';
}
showStart();

// ---- controls ----
const DIRS = {
  ArrowUp:    {x:0,y:-1}, w:{x:0,y:-1},
  ArrowDown:  {x:0,y:1},  s:{x:0,y:1},
  ArrowLeft:  {x:-1,y:0}, a:{x:-1,y:0},
  ArrowRight: {x:1,y:0},  d:{x:1,y:0},
};

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { if (state !== 'running') init(); return; }
  const d = DIRS[e.key] || DIRS[e.key.toLowerCase()];
  if (!d) return;
  // prevent 180° reversal
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  e.preventDefault();
});

// touch swipe
let tx = 0, ty = 0;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { if (state !== 'running') init(); return; }
  if (Math.abs(dx) > Math.abs(dy))
    nextDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else
    nextDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (nextDir.x === -dir.x && nextDir.y === -dir.y) nextDir = dir;
  if (state !== 'running') init();
});
</script>
</body>
</html>
